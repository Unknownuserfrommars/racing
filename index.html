<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Browser Racer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="game-wrap">
        <canvas id="game" width="960" height="540" aria-label="Racing game canvas"></canvas>
        <div class="hud">
          <div>
            <p class="label">Map</p>
            <p id="map-id">--</p>
          </div>
          <div>
            <p class="label">Time</p>
            <p id="timer">00:00.000</p>
          </div>
          <div>
            <p class="label">Best</p>
            <p id="best-time">--</p>
          </div>
          <div class="hud-actions">
            <button id="retry-btn" type="button">Retry</button>
            <label>
              <input type="checkbox" id="ghost-toggle" checked />
              Ghost
            </label>
          </div>
        </div>
      </section>

      <aside class="sidebar">
        <section class="card">
          <h1>Daily Racer</h1>
          <h6>Alpha Stage 0.2.0.102</h6>
          <p class="small">
            Controls: <strong>W/S</strong> throttle + brake, <strong>A/D</strong> steer.
          </p>
          <p class="small">Finish a lap to submit a run for today's track.</p>
        </section>

        <section class="card">
          <h2>Leaderboard (Top 20)</h2>
          <ol id="leaderboard"></ol>
          <p id="leaderboard-state" class="small"></p>
        </section>
      </aside>
    </main>

    <dialog id="name-dialog">
      <form method="dialog" id="name-form">
        <h3>Set display name</h3>
        <p class="small">This name is shown on the leaderboard.</p>
        <input id="display-name-input" name="display_name" minlength="2" maxlength="20" required />
        <menu>
          <button value="cancel" type="reset">Cancel</button>
          <button value="save" type="submit">Save</button>
        </menu>
      </form>
    </dialog>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
